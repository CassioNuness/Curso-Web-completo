<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8"> <!-- Define o conjunto de caracteres como UTF-8, garantindo suporte a caracteres especiais. -->
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- Torna o layout da página responsivo em dispositivos móveis. -->
    <title>Introdução do ES6</title> <!-- Define o título da aba do navegador. -->

    <!-- Inclui o Babel para permitir o uso de código ES6+ em navegadores mais antigos. -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Início do script com suporte ao Babel -->
    <script type="text/babel">
        // Declaração de uma variável usando 'let'
        let nome = 'Jorge';

        // As duas linhas abaixo foram comentadas para demonstração, mas mostram diferentes maneiras de exibir mensagens no console.
        // Método tradicional de concatenar strings:
        // console.log('Oi ' + nome + ', Tudo bem ?');
        // Uso de template literals para interpolação de variáveis:
        // console.log(`Oi ${nome}, tudo bem ?`);

        // Demonstrando uma expressão dentro de um template literal:
        // console.log(`7 + 7 = ${7+7}`);

        // Declaração de uma função chamada 'calcular', que recebe dois parâmetros: x e y.
        function calcular(x, y) {
            // A função retorna o produto de x e y.
            return x * y;
        }

        // Chamando a função 'calcular' com os valores 8 e 8.
        // O resultado é interpolado em um template literal e exibido no console.
        console.log(`A multiplicação de 8 * 8 é: ${calcular(8,8)}`);
    </script>
</head>

<body>

    <!-- Um contêiner vazio. Não é usado neste exemplo, mas poderia ser utilizado para exibir o conteúdo dinamicamente. -->
    <div id="output"></div>

</body>

</html>

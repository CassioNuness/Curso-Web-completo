<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Operador Rest</title>

    <!-- Babel permite utilizar recursos ES6+ diretamente no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">

        // ======================================================
        // OPERADOR REST (...)
        // ======================================================
        // O operador Rest agrupa vários parâmetros em um único array.

        // ------------------------------------------------------
        // Exemplo 1 - Soma de valores
        // ------------------------------------------------------

        function soma(...param) {

            let resultado = 0;

            // param recebe todos os argumentos em formato de array
            // Exemplo:
            // soma(3, 8, 5)
            // param = [3, 8, 5]

            param.forEach(v => resultado += v);

            return resultado;
        }

        console.log(soma(3, 8, 5, 7, -8, 10, 115));


        // ------------------------------------------------------
        // Exemplo 2 - Multiplicação
        // ------------------------------------------------------
        // O primeiro parâmetro é recebido normalmente.
        // Os demais são agrupados pelo Rest.

        function multiplicacao(m, ...p) {

            let resultado = 0;

            // Exemplo:
            // multiplicacao(5, 7, 12, 3, 49)
            //
            // m = 5
            // p = [7, 12, 3, 49]

            p.forEach(v => resultado += m * v);

            return resultado;

        }

        console.log(multiplicacao(5, 7, 12, 3, 49));

    </script>
</head>

<body>

</body>
</html>

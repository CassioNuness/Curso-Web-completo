<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Introdução ao ES6</title>

    <!-- Babel permite usar recursos modernos do JavaScript (ES6+) no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Código JavaScript usando ES6 -->
    <script type="text/babel">

        // Classe Produto (modelo para criar objetos)
        class Produto {
            // Método constructor é executado quando o objeto é criado
            constructor(descricao, preco) {
                // Propriedades do objeto
                this.descricao = descricao;
                this.preco = preco;
            }

            // Método da classe
            verDescricao() {
                // Template string (ES6) usando this para acessar as propriedades
                console.log(`${this.descricao} por apenas ${this.preco}`);
            }
        }
        
        // Criando um objeto a partir da classe Produto
        let produto = new Produto('Notebook', 2200);

        // Chamando o método do objeto
        produto.verDescricao();

        // Objeto literal (forma mais simples de criar um objeto)
        let produtoLiteral = {
            descricao: 'Geladeira',
            preco: 1800,

            // Método do objeto literal
            verDescricao: function() {
                console.log(`${this.descricao} por apenas ${this.preco}`);
            }
        }

        // Chamando o método do objeto literal
        produtoLiteral.verDescricao();

    </script>
</head>

<body>
    <!-- Div apenas ilustrativa, não usada no JavaScript -->
    <div id="output"></div>
</body>
</html>
